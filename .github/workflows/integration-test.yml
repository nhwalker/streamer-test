name: WebRTC Integration Test

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    # Upper bound covers a cold Rust build (~40 min) plus test execution (~5 min).
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── GStreamer image: cache as a Docker tarball ────────────────────────────
      # The GStreamer image takes 20-40 minutes to build on a cold cache because
      # it compiles gst-plugins-rs (Rust) from source.  We cache the final image
      # as a tar archive keyed on the files that affect the build.  On a cache
      # hit the image loads in < 30 seconds; on a miss we build it and save it
      # so that subsequent runs benefit from the cache.
      - name: Restore GStreamer image cache
        id: cache-gstreamer
        uses: actions/cache@v4
        with:
          path: /tmp/gstreamer-image.tar
          key: gstreamer-image-${{ runner.os }}-${{ hashFiles('Dockerfile', 'entrypoint.sh', 'pipeline.sh', 'web/**') }}

      - name: Load GStreamer image from cache
        if: steps.cache-gstreamer.outputs.cache-hit == 'true'
        run: docker load -i /tmp/gstreamer-image.tar

      - name: Build GStreamer image (cache miss)
        if: steps.cache-gstreamer.outputs.cache-hit != 'true'
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build -t webrtc-test-gstreamer:latest .

      - name: Save GStreamer image to cache
        if: steps.cache-gstreamer.outputs.cache-hit != 'true'
        run: docker save webrtc-test-gstreamer:latest -o /tmp/gstreamer-image.tar

      # ── Xvfb image ───────────────────────────────────────────────────────────
      # The Xvfb image is quick to build (< 2 minutes; package installs only)
      # so the test's ImageFromDockerfile call builds it at test time.
      # No pre-build or caching step is needed here.

      # ── Selenium Chrome ──────────────────────────────────────────────────────
      # Pre-pull to avoid a slow first-time download counting against the
      # test timeout when BrowserWebDriverContainer starts.
      - name: Pre-pull Selenium Chrome image
        run: docker pull selenium/standalone-chrome:latest

      # ── Java + Gradle ────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # gradle/actions/setup-gradle downloads the specified Gradle version and
      # caches the Gradle user-home (~/.gradle) and build cache across runs.
      # gradle-version is used directly (no Gradle wrapper required).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # ── Run tests ────────────────────────────────────────────────────────────
      - name: Run integration tests
        working-directory: tests
        env:
          # Ryuk (the testcontainers resource reaper) maintains a keepalive socket
          # and destroys containers if it times out.  On ephemeral CI runners
          # cleanup is guaranteed by the job ending, so Ryuk is unnecessary and
          # can cause spurious failures during long image builds.
          TESTCONTAINERS_RYUK_DISABLED: "true"
          # Use BuildKit for all docker build calls (including ImageFromDockerfile)
          # so layer caches from the pre-build step above are shared.
          DOCKER_BUILDKIT: "1"
        run: gradle test --no-daemon --info

      # ── Artefacts on failure ─────────────────────────────────────────────────
      - name: Upload test artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-artefacts
          path: |
            tests/build/reports/tests/
            tests/build/test-results/
          retention-days: 7
