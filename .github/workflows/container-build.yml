name: Build Container

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build image with Podman
        id: build-image
        run: |
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          TAGS_ARGS=""
          while IFS= read -r tag; do
            TAGS_ARGS="$TAGS_ARGS -t $tag"
          done <<< "${{ steps.meta.outputs.tags }}"
          podman build $TAGS_ARGS \
            --label "${{ steps.meta.outputs.labels }}" \
            -f Containerfile .
          echo "image=$PRIMARY_TAG" >> $GITHUB_OUTPUT

      - name: Push to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          while IFS= read -r tag; do
            podman push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
