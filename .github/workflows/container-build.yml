name: Build Container

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Patch Containerfile to use bash for RUN commands
        run: |
          sed -i '/^FROM ubuntu:24.04 AS builder$/a SHELL ["/bin/bash", "-c"]' Containerfile

      - name: Build image
        id: build-image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          TAGS_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS_ARGS+=(-t "$tag")
          done <<< "$TAGS"

          LABEL_ARGS=()
          while IFS= read -r label; do
            [ -n "$label" ] && LABEL_ARGS+=(--label "$label")
          done <<< "$LABELS"

          buildah bud \
            "${TAGS_ARGS[@]}" \
            "${LABEL_ARGS[@]}" \
            -f Containerfile .

          echo "image=$(echo "$TAGS" | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Push to GitHub Container Registry
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$GITHUB_TOKEN" | buildah login "${{ env.REGISTRY }}" \
            -u "${{ github.actor }}" --password-stdin
          while IFS= read -r tag; do
            [ -n "$tag" ] && buildah push "$tag"
          done <<< "$TAGS"
