name: Build Container

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, cache, and export image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          outputs: type=docker,dest=/tmp/streamer-test.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: /tmp/streamer-test.tar
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            google-chrome-stable \
            x11-utils \
            x11-apps \
            imagemagick \
            coturn

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install Python test dependencies
        run: pip install -r tests/requirements.txt

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Load image into Docker
        run: |
          IMAGE=$(docker load -i /tmp/streamer-test.tar | grep "Loaded image:" | head -1 | awk '{print $NF}')
          docker tag "${IMAGE}" streamer-test:ci

      - name: Start local TURN relay
        run: |
          # Start coturn on loopback so WebRTC ICE relay candidates are 127.0.0.1
          # (Azure VMs block same-IP UDP hairpin on the external interface).
          turnserver \
            --listening-port=3478 \
            --listening-ip=127.0.0.1 \
            --relay-ip=127.0.0.1 \
            --lt-cred-mech \
            --user=ci:ci \
            --realm=test.local \
            --no-tls \
            --no-dtls \
            --allow-loopback-peers \
            --no-cli \
            --verbose \
            --log-file=/tmp/turnserver.log &
          for i in $(seq 1 20); do
            if ss -ulnp 2>/dev/null | grep -q ':3478 '; then
              echo "TURN server ready on UDP 3478"; break
            fi
            sleep 0.5
          done

      - name: Run integration tests
        env:
          TEST_IMAGE: streamer-test:ci
          # GStreamer side: pipeline.py passes this to webrtcbin via add-turn-server
          GST_WEBRTC_TURN_SERVER: "turn://ci:ci@127.0.0.1:3478"
          # Browser side: index.html reads these from URL params
          WEBRTC_TURN_SERVER: "turn:127.0.0.1:3478"
          WEBRTC_TURN_USER: "ci"
          WEBRTC_TURN_CRED: "ci"
        run: pytest tests/ -v --tb=short

      - name: Show TURN server log
        if: always()
        run: |
          echo "=== coturn log ==="
          cat /tmp/turnserver.log 2>/dev/null || echo "(no log file)"
