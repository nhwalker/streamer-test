name: Build Containers

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}

jobs:
  build-base:
    name: Build base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract base metadata
        id: base-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}/streamer-base
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, cache, and export base image
        uses: docker/build-push-action@v6
        with:
          context: base/
          file: base/Containerfile
          tags: ${{ steps.base-meta.outputs.tags }}
          labels: ${{ steps.base-meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          outputs: type=oci,dest=/tmp/streamer-base.tar
          cache-from: type=gha,scope=base-buildcache
          cache-to: type=gha,scope=base-buildcache,mode=max

      - name: Upload base image artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-image
          path: /tmp/streamer-base.tar
          retention-days: 1

  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write
    strategy:
      # Let one image's build continue if the other fails — makes debug
      # faster because you see both outcomes on the same run.
      fail-fast: false
      matrix:
        include:
          - image: desktop-caster
            context: ./caster
            cache_scope: caster-buildcache
            artifact: caster-image
            tarball: /tmp/desktop-caster.tar
          - image: desktop-stream-service
            context: ./service
            cache_scope: service-buildcache
            artifact: service-image
            tarball: /tmp/desktop-stream-service.tar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download base image artifact
        uses: actions/download-artifact@v4
        with:
          name: base-image
          path: /tmp/artifacts/base

      - name: Extract base OCI layout
        run: |
          mkdir -p /tmp/base-oci
          tar -xf /tmp/artifacts/base/streamer-base.tar -C /tmp/base-oci
          ls /tmp/base-oci

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, cache, and export image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Containerfile
          build-contexts: |
            streamer-base=oci-layout:///tmp/base-oci
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          outputs: type=docker,dest=${{ matrix.tarball }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.tarball }}
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            google-chrome-stable \
            x11-utils \
            x11-apps \
            imagemagick \
            coturn

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install Python test dependencies
        run: pip install -r tests/requirements.txt

      - name: Download caster image
        uses: actions/download-artifact@v4
        with:
          name: caster-image
          path: /tmp/artifacts/caster
          merge-multiple: false

      - name: Download service image
        uses: actions/download-artifact@v4
        with:
          name: service-image
          path: /tmp/artifacts/service
          merge-multiple: false

      - name: Load images into Docker
        run: |
          CASTER_LOADED=$(docker load -i /tmp/artifacts/caster/desktop-caster.tar \
                          | grep "Loaded image:" | head -1 | awk '{print $NF}')
          docker tag "${CASTER_LOADED}"  desktop-caster:ci

          SERVICE_LOADED=$(docker load -i /tmp/artifacts/service/desktop-stream-service.tar \
                           | grep "Loaded image:" | head -1 | awk '{print $NF}')
          docker tag "${SERVICE_LOADED}" desktop-stream-service:ci

          docker images | grep -E '^(desktop-caster|desktop-stream-service)\s+ci\s'

      - name: Start local TURN relay
        run: |
          # Loopback TURN so WebRTC ICE relay candidates are 127.0.0.1
          # (Azure VMs block same-IP UDP hairpin on the external interface).
          turnserver \
            --listening-port=3478 \
            --listening-ip=127.0.0.1 \
            --relay-ip=127.0.0.1 \
            --lt-cred-mech \
            --user=ci:ci \
            --realm=test.local \
            --no-tls \
            --no-dtls \
            --allow-loopback-peers \
            --no-cli \
            --verbose \
            --log-file=/tmp/turnserver.log &
          for i in $(seq 1 20); do
            if ss -ulnp 2>/dev/null | grep -q ':3478 '; then
              echo "TURN server ready on UDP 3478"; break
            fi
            sleep 0.5
          done

      - name: Run integration tests
        env:
          # conftest.py reads these to pick which images to run against.
          CASTER_IMAGE:  "desktop-caster:ci"
          SERVICE_IMAGE: "desktop-stream-service:ci"
          # GStreamer side: service/pipeline.py passes this to webrtcbin.
          GST_WEBRTC_TURN_SERVER: "turn://ci:ci@127.0.0.1:3478"
          # Browser side: index.html reads these from URL params.
          WEBRTC_TURN_SERVER: "turn:127.0.0.1:3478"
          WEBRTC_TURN_USER: "ci"
          WEBRTC_TURN_CRED: "ci"
        run: pytest tests/ -v --tb=short

      - name: Show TURN server log
        if: always()
        run: |
          echo "=== coturn log ==="
          cat /tmp/turnserver.log 2>/dev/null || echo "(no log file)"
