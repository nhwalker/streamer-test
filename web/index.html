<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Stream</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #status {
      padding: 0.75em 1.25em;
      background: rgba(255,255,255,0.07);
      border-radius: 6px;
      margin-bottom: 1em;
      max-width: 480px;
      text-align: center;
      line-height: 1.5;
    }

    #status.error { color: #f88; background: rgba(255,80,80,0.12); }
    #status.hidden { display: none; }

    video {
      max-width: 100vw;
      max-height: 100vh;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <p id="status">Connecting to signalling server…</p>
  <video id="stream" autoplay playsinline></video>

  <!--
    The webpack bundle sets window.GstWebRTCAPI (not an ES-module export),
    so it must be loaded as a classic script before the inline script runs.

    Query parameters:
      ?signalling=ws://host:8443   Override the signalling server URL.
                                   Defaults to ws://<this page's hostname>:8443
      ?stun=stun.l.google.com:19302  Add a STUN server for ICE when the
                                     browser and container are on different hosts.
  -->
  <!--
    GStreamer's webrtcbin uses ssrc-level MSID (a=ssrc:... msid:...) rather than
    the Unified-Plan m-line-level attribute (a=msid:).  Chrome's Unified-Plan
    RTCPeerConnection therefore fires ontrack with event.streams = [].
    gstwebrtc-api checks event.streams[0] and silently returns when it's absent,
    leaving video.srcObject unset even though the connection is fully established.

    This shim patches RTCPeerConnection BEFORE gstwebrtc-api loads so that every
    consumer peer connection also has a track listener that creates a MediaStream
    directly from event.track when event.streams is empty.
  -->
  <script>
    (function () {
      var _OrigRPC = window.RTCPeerConnection;
      function PatchedRPC(cfg) {
        var pc = new _OrigRPC(cfg);
        pc.addEventListener('track', function (e) {
          var vid = document.getElementById('stream');
          if (!vid || vid.srcObject) return;
          vid.srcObject = (e.streams && e.streams.length > 0)
            ? e.streams[0]
            : new MediaStream([e.track]);
        });
        return pc;
      }
      PatchedRPC.prototype = _OrigRPC.prototype;
      window.RTCPeerConnection = PatchedRPC;
    })();
  </script>
  <script src="./gstwebrtc-api/gstwebrtc-api.js"></script>
  <script>
    const params   = new URLSearchParams(window.location.search);
    const sigUrl   = params.get('signalling') ??
                     `ws://${window.location.hostname}:8443`;
    const stunUrl  = params.get('stun');
    const turnUri  = params.get('turn_uri');
    const turnUser = params.get('turn_user');
    const turnCred = params.get('turn_cred');

    const video  = document.getElementById('stream');
    const status = document.getElementById('status');

    const setStatus = (msg, isError = false) => {
      status.textContent = msg;
      status.className   = isError ? 'error' : '';
    };

    setStatus(`Connecting to ${sigUrl} …`);

    const iceServers = [];
    if (stunUrl) iceServers.push({ urls: `stun:${stunUrl}` });
    if (turnUri) iceServers.push({ urls: turnUri, username: turnUser ?? undefined, credential: turnCred ?? undefined });

    const api = new GstWebRTCAPI({
      signalingServerUrl: sigUrl,
      // webrtcConfig is passed directly to RTCPeerConnection() by gstwebrtc-api.
      webrtcConfig: { iceServers },
    });

    api.registerProducersListener({
      producerAdded(producer) {
        setStatus(`Producer found (${producer.id}) — starting stream…`);

        const session = api.createConsumerSession(producer.id);
        if (!session) {
          setStatus('Failed to create consumer session.', true);
          return;
        }

        session.element = video;

        session.addEventListener('error', (e) => {
          setStatus(`Stream error: ${e.message ?? e}`, true);
        });

        session.addEventListener('closed', () => {
          setStatus('Stream ended.');
          video.srcObject = null;
        });

        video.addEventListener('playing', () => {
          status.className = 'hidden';
        }, { once: true });

        session.connect();
      },

      producerRemoved(_producer) {
        setStatus('Producer disconnected. Waiting for stream…');
        video.srcObject = null;
      },
    });
  </script>
</body>
</html>
